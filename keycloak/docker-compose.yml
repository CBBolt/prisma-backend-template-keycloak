version: "3"

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak-app
    command:
      - start-dev
      - --spi-theme-cache-themes=false
      - --spi-theme-cache-templates=false
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./themes:/opt/keycloak/themes
